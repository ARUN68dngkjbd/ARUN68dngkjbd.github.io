<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arun's Gamified Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Profile -->
    <div class="card">
      <h1>🎮 ARUN KUMAR</h1>
      <p>Level: <span id="level">1</span></p>
      <div class="xp-bar">
        <div id="xp"></div>
      </div>
      <button onclick="gainXP()">Gain XP</button>
    </div>

    <!-- Skills -->
    <div class="card">
      <h2>🧠 Skills</h2>
      <ul id="skills">
        <li>🔓 C Programming</li>
        <li>🔓 HTML</li>
        <li>🔒 Java (Locked)</li>
      </ul>
    </div>

    <!-- Projects -->
    <div class="card">
      <h2>📂 Missions (Projects)</h2>
      <ul>
        <li>🚀 Portfolio Website</li>
        <li>📊 Power BI Dashboard</li>
      </ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
